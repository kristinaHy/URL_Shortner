{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Shortener</title>
<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(180deg,#1e88e5,#42a5f5);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}
.container{
    text-align:center;
    width:100%;
    max-width:900px;
    padding:40px 20px;
}
h1{
    font-size:56px;
    letter-spacing:3px;
    margin-bottom:10px;
}
p.subtitle{
    font-size:22px;
    opacity:0.9;
    margin-bottom:40px;
}
.form-box{
    display:flex;
    background:white;
    border-radius:60px;
    overflow:hidden;
    box-shadow:0 15px 30px rgba(0,0,0,0.2);
}
.form-box input{
    flex:1;
    padding:22px 30px;
    border:none;
    font-size:20px;
    outline:none;
}
.form-box button{
    width:180px;
    border:none;
    font-size:24px;
    font-weight:bold;
    color:white;
    background: linear-gradient(90deg,#ff5f6d,#ff8c42);
    cursor:pointer;
}
.result-box{
    margin-top:50px;
    padding:30px;
    border-radius:30px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border:1px solid rgba(255,255,255,0.3);
}
.short-url{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,0.9);
    color:#1e3c72;
    padding:18px 25px;
    border-radius:20px;
    font-size:26px;
    font-weight:bold;
}
.copy-btn{
    background:#1f3c88;
    color:white;
    border:none;
    padding:12px 22px;
    border-radius:14px;
    font-size:18px;
    cursor:pointer;
}
.share-text{
    margin-top:15px;
    opacity:0.9;
}
</style>
</head>
<body>
<div class="container">
<h1>URL SHORTENER</h1>
<p class="subtitle">Shorten long URLs easily!</p>

<form method="post">
{% csrf_token %}
<div class="form-box">
<input type="url" name="long_url" placeholder="Enter your long URL here..." required>
<button type="submit">Shorten</button>
</div>
</form>

{% if short_url %}
<div class="result-box">
<div class="short-url">
<span id="shortUrl">{{ short_url }}</span>
<button class="copy-btn" onclick="copyURL()">📋 Copy</button>
</div>
<p class="share-text">Share this short link with others!</p>
</div>
{% endif %}
</div>

<script>
function copyURL(){
    const url = document.getElementById('shortUrl').innerText;
    navigator.clipboard.writeText(url);
    alert('Copied!');
}
</script>
</body>
</html>
